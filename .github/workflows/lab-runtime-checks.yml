name: Lab Runtime Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run lab runtime checks
        run: uv run python scripts/run_lab_runtime_checks.py --json /tmp/lab-runtime-report.json

      - name: Upload lab runtime report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-runtime-report
          path: /tmp/lab-runtime-report.json
